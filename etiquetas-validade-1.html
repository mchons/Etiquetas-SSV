    .col{display:flex;flex-direction:column;gap:20px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .3s ease}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,51,41,.4)}50%{box-shadow:0 0 0 8px rgba(230,51,41,0)}}

    .label-produto{font-size:17px;font-weight:700;line-height:1.2;max-width:160px}

    .lhoraval{font-weight:700;font-size:14px}

const addH   = (d,h) => { const r=new Date(d); r.setTime(r.getTime()+h*3600000); return r; };
const addD   = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const addMin = (d,m) => { const r=new Date(d); r.setTime(r.getTime()+m*60000); return r; };
const calcBar = (d,num,unit) => unit==="dias" ? addD(d,num) : unit==="horas" ? addH(d,num) : addMin(d,num);
const fmtDate = d => String(d.getDate()).padStart(2,'0')+"/"+String(d.getMonth()+1).padStart(2,'0')+"/"+String(d.getFullYear()).slice(-2);
const fmtTime = d => String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');
const fmtPrim = d => d ? String(d.getDate()).padStart(2,'0')+"."+String(d.getMonth()+1).padStart(2,'0')+"."+String(d.getFullYear()).slice(-2) : "";
const fmtDesc = h => !h ? "N/A" : !Number.isInteger(h) ? Math.round(h*60)+"min" : h+"h";
const fmtVB   = (n,u) => u==="minutos" ? n+"min" : u==="horas" ? n+"h" : n+"d";
const nowLocal = () => { const n=new Date(); return new Date(n.getTime()-n.getTimezoneOffset()*60000).toISOString().slice(0,16); };

function doPrint(ref) {
  const w=window.open("","_blank");
  w.document.write('<!DOCTYPE html><html><head><title>Etiqueta</title><link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap" rel="stylesheet"><style>'+PS+'</style></head><body>'+ref.current.innerHTML+'</body></html>');
  w.document.close(); w.focus();
  setTimeout(()=>{ w.print(); w.close(); },500);
}

function ProductList({lista, prodIdx, setProdIdx}) {
  return (
    <div className="scroll-list" style={{display:"flex",flexDirection:"column",gap:4}}>
      {lista.map((p,i)=>(
        <div key={i} className={"prod-item "+(prodIdx===i?"selected":"")} onClick={()=>setProdIdx(i)}>
          <div style={{fontWeight:700,fontSize:14}}>{p.nome}</div>
          <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
            <span className="cat-tag">{p.fornecedor||p.categoria}</span>
            {p.descongelamento && <span className="badge">T {fmtDesc(p.descongelamento)}</span>}
            {p.validade        && <span className="badge badge-green">V {p.validade}d</span>}
            {p.validadeNum     && <span className="badge badge-green">V {fmtVB(p.validadeNum,p.validadeUnit)}</span>}
          </div>
        </div>
      ))}
      {lista.length===0 && <div style={{color:"#555",textAlign:"center",padding:20,fontSize:14}}>Nenhum produto encontrado</div>}
    </div>
  );
}

function FoodTab() {
  const [catSel,setCatSel]=useState("");
  const [rawIdx,setRawIdx]=useState(null);
  const [saida,setSaida]=useState(nowLocal());
  const [lote,setLote]=useState("");
  const [valPrim,setValPrim]=useState("");
  const [busca,setBusca]=useState("");
  const labelRef=useRef(null);
  const cats=[...new Set(PRODUTOS_FOOD.map(p=>p.categoria))];
  const lista=PRODUTOS_FOOD.filter(p=>(!catSel||p.categoria===catSel)&&(!busca||p.nome.toLowerCase().includes(busca.toLowerCase())||p.fornecedor.toLowerCase().includes(busca.toLowerCase())));
  const prod=rawIdx!==null?lista[rawIdx]:null;
  const saidaDate=saida?new Date(saida):new Date();
  const dispDate=prod&&prod.descongelamento?addH(saidaDate,prod.descongelamento):saidaDate;
  const valDate=prod&&prod.validade?addD(dispDate,prod.validade):null;
  const dia=valDate?DIAS_PT[valDate.getDay()]:DIAS_PT[saidaDate.getDay()];
  const vpd=valPrim?new Date(valPrim+"T00:00:00"):null;
  return (
    <div className="grid">
      <div className="col">
        <div className="card">
          <div className="section-title">1 - Selecione o produto</div>
          <input className="ctrl" placeholder="Buscar produto ou fornecedor..." value={busca} onChange={e=>{setBusca(e.target.value);setRawIdx(null);}} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:14,marginBottom:10}}/>
          <select className="ctrl" value={catSel} onChange={e=>{setCatSel(e.target.value);setRawIdx(null);}} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:13,marginBottom:12,appearance:"none"}}>
            <option value="">Todas as categorias</option>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <ProductList lista={lista} prodIdx={rawIdx} setProdIdx={setRawIdx}/>
        </div>
        <div className="card">
          <div className="section-title">2 - Data/Hora de saida do freezer</div>
          <input type="datetime-local" className="ctrl" value={saida} onChange={e=>setSaida(e.target.value)} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:15}}/>
        </div>
        <div className="card">
          <div className="section-title">3 - Lote e validade primaria</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,letterSpacing:1,color:"#888",display:"block",marginBottom:6}}>LOTE</label>
            <input className="ctrl" placeholder="Ex: 14L25" value={lote} onChange={e=>setLote(e.target.value.toUpperCase())} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:16,fontWeight:700,letterSpacing:1}}/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:700,letterSpacing:1,color:"#888",display:"block",marginBottom:6}}>VALIDADE PRIMARIA</label>
            <input type="date" className="ctrl" value={valPrim} onChange={e=>setValPrim(e.target.value)} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:15}}/>
          </div>
        </div>
      </div>
      <div className="col">
        {prod&&(
          <div className="card fade-in">
            <div className="section-title">Calculo automatico</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[{key:"S",label:"Saida / Descongelamento",date:saidaDate,color:"#4a9eff"},{key:"D",label:"Disponivel (+"+fmtDesc(prod.descongelamento)+")",date:dispDate,color:"#ffd700"},{key:"V",label:prod.validade?"Validade (+"+prod.validade+" dias)":"Validade (N/A)",date:valDate,color:"#5dde8a"}].map(r=>(
                <div key={r.key} style={{display:"flex",alignItems:"center",gap:12,background:"#111",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontWeight:900,fontSize:20,color:r.color,minWidth:24}}>{r.key}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#666"}}>{r.label}</div>
                    <div style={{fontWeight:700,fontSize:15}}>{r.date?DIAS_FULL[r.date.getDay()]+" - "+fmtDate(r.date)+" as "+fmtTime(r.date):"N/A"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="card">
          <div className="section-title">Preview da etiqueta</div>
          <div style={{display:"flex",justifyContent:"center"}}>
            {prod?(
              <div ref={labelRef} className="fade-in pulse">
                <div className="label-print">
                  <div className="label-header"><div className="label-dia">{dia}</div><div className="label-produto">{prod.nome.split(" ").slice(0,3).join(" ")}</div></div>
                  <div className="label-body">
                    <div className="label-row"><span className="label-key">S:</span><span className="label-date">{fmtDate(saidaDate)}</span><span className="lhoralbl">Hora:</span><span className="lhoraval">{fmtTime(saidaDate)}</span></div>
                    <div className="label-row"><span className="label-key">D:</span><span className="label-date">{fmtDate(dispDate)}</span><span className="lhoralbl">Hora:</span><span className="lhoraval">{fmtTime(dispDate)}</span></div>
                    <div className="label-row"><span className="label-key">V:</span><span className="label-date">{valDate?fmtDate(valDate):"N/A"}</span>{valDate&&<><span className="lhoralbl">Hora:</span><span className="lhoraval">{fmtTime(dispDate)}</span></>}</div>
                    <hr className="label-divider"/>
                    <div className="lmrow"><span className="lmkey">Lote:</span><span className="lmval">{lote||"___________"}</span></div>
                    <div className="lmrow"><span className="lmkey">V. Primaria:</span><span className="lmval">{vpd?fmtPrim(vpd):"___________"}</span></div>
                  </div>
                </div>
              </div>
            ):(
              <div style={{color:"#444",textAlign:"center",padding:"40px 20px",fontSize:14}}>Selecione um produto para gerar a etiqueta</div>
            )}
          </div>
        </div>
        <button className="btn-main" disabled={!prod||!lote} onClick={()=>doPrint(labelRef)}>Imprimir Etiqueta</button>
        {(!prod||!lote)&&<div style={{textAlign:"center",fontSize:12,color:"#555",marginTop:4}}>{!prod?"Selecione um produto":"Informe o numero do lote"}</div>}
      </div>
    </div>
  );
}

function BarTab() {
  const [catSel,setCatSel]=useState("");
  const [rawIdx,setRawIdx]=useState(null);
  const [abertura,setAbertura]=useState(nowLocal());
  const [valPrim,setValPrim]=useState("");
  const [busca,setBusca]=useState("");
  const labelRef=useRef(null);
  const cats=[...new Set(PRODUTOS_BAR.map(p=>p.categoria))];
  const lista=PRODUTOS_BAR.filter(p=>(!catSel||p.categoria===catSel)&&(!busca||p.nome.toLowerCase().includes(busca.toLowerCase())));
  const prod=rawIdx!==null?lista[rawIdx]:null;
  const abDate=abertura?new Date(abertura):new Date();
  const valDate=prod?calcBar(abDate,prod.validadeNum,prod.validadeUnit):null;
  const dia=valDate?DIAS_PT[valDate.getDay()]:DIAS_PT[abDate.getDay()];
  const vpd=valPrim?new Date(valPrim+"T00:00:00"):null;
  return (
    <div className="grid">
      <div className="col">
        <div className="card">
          <div className="section-title">1 - Selecione o produto</div>
          <input className="ctrl" placeholder="Buscar produto..." value={busca} onChange={e=>{setBusca(e.target.value);setRawIdx(null);}} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:14,marginBottom:10}}/>
          <select className="ctrl" value={catSel} onChange={e=>{setCatSel(e.target.value);setRawIdx(null);}} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:13,marginBottom:12,appearance:"none"}}>
            <option value="">Todas as categorias</option>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <ProductList lista={lista} prodIdx={rawIdx} setProdIdx={setRawIdx}/>
        </div>
        <div className="card">
          <div className="section-title">2 - Data/Hora de abertura / preparacao</div>
          <input type="datetime-local" className="ctrl" value={abertura} onChange={e=>setAbertura(e.target.value)} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:15}}/>
        </div>
        <div className="card">
          <div className="section-title">3 - Validade primaria (embalagem)</div>
          <input type="date" className="ctrl" value={valPrim} onChange={e=>setValPrim(e.target.value)} style={{width:"100%",background:"#111",border:"1px solid #333",borderRadius:6,padding:"10px 14px",color:"#f0f0f0",fontSize:15}}/>
        </div>
      </div>
      <div className="col">
        {prod&&(
          <div className="card fade-in">
            <div className="section-title">Calculo automatico</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[{key:"A",label:"Abertura / Preparacao",date:abDate,color:"#4a9eff"},{key:"V",label:"Validade (+"+fmtVB(prod.validadeNum,prod.validadeUnit)+")",date:valDate,color:"#5dde8a"}].map(r=>(
                <div key={r.key} style={{display:"flex",alignItems:"center",gap:12,background:"#111",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontWeight:900,fontSize:20,color:r.color,minWidth:24}}>{r.key}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#666"}}>{r.label}</div>
                    <div style={{fontWeight:700,fontSize:15}}>{r.date?DIAS_FULL[r.date.getDay()]+" - "+fmtDate(r.date)+" as "+fmtTime(r.date):"N/A"}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="card">
          <div className="section-title">Preview da etiqueta</div>
          <div style={{display:"flex",justifyContent:"center"}}>
            {prod?(
              <div ref={labelRef} className="fade-in pulse">
                <div className="label-print">
                  <div className="label-header"><div className="label-dia">{dia}</div><div className="label-produto">{prod.nome.split(" ").slice(0,3).join(" ")}</div></div>
                  <div className="label-body">
                    <div className="label-row"><span className="label-key">A:</span><span className="label-date">{fmtDate(abDate)}</span><span className="lhoralbl">Hora:</span><span className="lhoraval">{fmtTime(abDate)}</span></div>
                    <div className="label-row"><span className="label-key">V:</span><span className="label-date">{valDate?fmtDate(valDate):"N/A"}</span>{valDate&&<><span className="lhoralbl">Hora:</span><span className="lhoraval">{fmtTime(valDate)}</span></>}</div>
                    <hr className="label-divider"/>
                    <div className="lmrow"><span className="lmkey">V. Primaria:</span><span className="lmval">{vpd?fmtPrim(vpd):"___________"}</span></div>
                  </div>
                </div>
              </div>
            ):(
              <div style={{color:"#444",textAlign:"center",padding:"40px 20px",fontSize:14}}>Selecione um produto para gerar a etiqueta</div>
            )}
          </div>
        </div>
        <button className="btn-main" disabled={!prod} onClick={()=>doPrint(labelRef)}>Imprimir Etiqueta</button>
        {!prod&&<div style={{textAlign:"center",fontSize:12,color:"#555",marginTop:4}}>Selecione um produto</div>}
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("food");
  return (
    <div>
      <div style={{background:"#e63329",padding:"20px 32px",display:"flex",alignItems:"center",gap:16}}>
        <div style={{width:44,height:44,background:"white",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🏷️</div>
        <div>
          <div style={{fontWeight:900,fontSize:22,letterSpacing:1}}>GERADOR DE ETIQUETAS</div>
          <div style={{fontSize:12,fontWeight:600,letterSpacing:2,opacity:.85}}>DESCONGELAMENTO & VALIDADE</div>
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 20px 0"}}>
        <div className="tab-bar">
          <button className={"tab-btn "+(tab==="food"?"active":"")} onClick={()=>setTab("food")}>🍞  FOOD</button>
          <button className={"tab-btn "+(tab==="bar"?"active":"")}  onClick={()=>setTab("bar")}>☕  BAR</button>
        </div>
      </div>
      {tab==="food"?<FoodTab/>:<BarTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
